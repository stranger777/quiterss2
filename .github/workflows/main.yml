name: Build QuiteRSS for Windows

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  QT_DIR: ${{ github.workspace }}/qt/5.15.2/msvc2019_64
  QT_BIN_DIR: ${{ github.workspace }}/qt/5.15.2/msvc2019_64/bin

jobs:
  build-windows:
    runs-on: windows-2019

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Qt 5.15
      uses: jurplel/install-qt-action@v4
      with:
        version: '5.15.2'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        dir: '${{ github.workspace }}/qt'
        cached: 'true'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Add Qt to PATH
      run: echo "${{ env.QT_BIN_DIR }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Configure (qmake)
      run: |
        New-Item -ItemType Directory -Force -Path build
        cd build
        qmake CONFIG+=release -spec win32-msvc ..\quiterss2.pro
      shell: pwsh

    - name: Build
      run: |
        cd build
        nmake
      shell: cmd

    - name: Deploy Qt Dependencies
      run: |
        $deployDir = "dist"
        New-Item -ItemType Directory -Force -Path $deployDir

        Copy-Item "build\bin\QuiteRSS.exe" "$deployDir\" -Force

        & "${{ env.QT_BIN_DIR }}\windeployqt.exe" --release --qmldir="..\resources\qml" --webengine --no-compiler-runtime "$deployDir\QuiteRSS.exe"
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuiteRSS-Windows-Build
        path: dist/
        retention-days: 14
