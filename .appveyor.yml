version: build{build}-{branch}
image: Visual Studio 2022

environment:
  QTDIR: C:\Qt\6.7.3\msvc2019_64

install:
  - cmd: C:\Python312-x64\python.exe -m pip install --upgrade pip
  - cmd: C:\Python312-x64\python.exe -m pip install --upgrade git+https://github.com/miurahr/aqtinstall.git
  - cmd: C:\Python312-x64\python.exe -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 -O C:\Qt

build_script:
  - cmd: call tools\build\appveyor-ci.bat

artifacts:
  - path: build\bin
    name: QuiteRSS-%APPVEYOR_BUILD_VERSION%
