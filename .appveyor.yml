version: build{build}-{branch}
image: Visual Studio 2022

environment:
  QTDIR: C:\Qt\6.7.3\msvc2019_64

install:
  - cmd: C:\Python312-x64\python.exe -m pip install --upgrade pip
  - cmd: C:\Python312-x64\python.exe -m pip install "aqtinstall>=3.2"
  - cmd: C:\Python312-x64\python.exe -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 -m qtwebengine qtwebchannel qtwebsockets qtpositioning -O C:\Qt
  - cmd: echo === Qt directory structure ===
  - cmd: dir C:\Qt\6.7.3\msvc2019_64 /b
  - cmd: echo === QML WebEngine check ===
  - cmd: dir C:\Qt\6.7.3\msvc2019_64\qml\QtWebEngine /s /b 2>nul || echo No QtWebEngine QML
  - cmd: echo === QtWebEngine libs ===
  - cmd: dir C:\Qt\6.7.3\msvc2019_64\lib\*WebEngine* /b 2>nul || echo No WebEngine libs

build_script:
  - cmd: call tools\build\appveyor-ci.bat

artifacts:
  - path: build\bin
    name: QuiteRSS-%APPVEYOR_BUILD_VERSION%
