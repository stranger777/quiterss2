version: build{build}-{branch}
image: Visual Studio 2022

environment:
  QTDIR: C:\Qt\6.8.2\msvc2019_64

install:
  - cmd: python -m pip install --upgrade pip
  - cmd: python -m pip install aqtinstall
  - cmd: python -m aqt install-qt windows desktop 6.8.2 win64_msvc2019_64 -O C:\Qt

build_script:
  - cmd: call tools\build\appveyor-ci.bat

artifacts:
  - path: build\bin
    name: QuiteRSS-%APPVEYOR_BUILD_VERSION%
